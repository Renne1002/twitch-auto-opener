[twitch_api]
client_id = "ここにクライアントIDを入力"
client_secret = "ここにクライアントシークレットを入力"

[streamer_default_config]
auto_open = true # 配信開始時に自動でブラウザを開くか
record = false   # 配信開始時に自動で録画を開始するか
auto_srt = false # 録画完了後に自動で字幕(.srt)を作成するか

[streamer_default_config.youtube]
enabled = false

# Option: 配信者ごとのデフォルトタイトルテンプレート
# title_template = "[Twitch Recording] {id} {ts:%Y-%m-%d %H:%M}"

# Option: 配信者ごとのデフォルト公開範囲 (private / unlisted / public)
# privacy_status = "unlisted"

# Option: YouTubeアップロード成功後に.tsを削除するか
# delete_ts_after_upload = false

[streamer_configs]
streamer1 = {}
streamer2 = { record = true }
streamer3 = { record = true, auto_srt = true }
# streamer4 = { youtube = { enabled = true } }
# streamer5 = { youtube = { enabled = true, title_template = "【TW】{id} {ts:%Y%m%d_%H%M}", delete_ts_after_upload = true } }

[chrome]
profile_email = "ここに Chrome プロフィールのメールアドレスを入力"

# Option: chrome.exe のパス
# path = "C:/Program Files/Google/Chrome/Application/chrome.exe"

# Option: Chrome の User Data フォルダ
# user_data_dir = "C:/Users/<User>/AppData/Local/Google/Chrome/User Data"

[monitor]
# チェック間隔（秒）。
check_interval_seconds = 15
debug = false

[youtube]
enabled = true
min_age_days = 7
tick_interval_seconds = 300
state_file = "./VOD/.youtube_upload_state.json"
history_file = "./VOD/.youtube_upload_history.jsonl"
max_uploads_per_tick = 1

[youtube.auth]
# GCPで取得したOAuthクライアント情報(json)
client_secrets_file = "./secrets/youtube_client_secret.json"

# 初回認証後に生成されるトークン保存先
token_file = "./secrets/youtube_token.json"

[youtube.defaults]
privacy_status = "unlisted"
title_template = "[Twitch Recording] {id} {ts:%Y-%m-%d %H:%M}"
category_id = "20"
made_for_kids = false
delete_ts_after_upload = false

[youtube.quota]
quota_reset_timezone = "America/Los_Angeles"
skip_after_quota_exceeded_for_day = true

[recording]
# 録画セグメントごとに .ts を .mp4 に変換するか
convert_to_mp4 = true

# 配信中に録画プロセスが終了した場合の再試行待機時間（秒）
retry_delay_seconds = 10

# Option: 録画ファイルの出力先フォルダ
# output_dir = "./VOD"

# Option: 保存画質（best, 1080p60, 720p など）
quality = "best"

[recording.tools]
streamlink_path = "streamlink"
ffmpeg_path = "ffmpeg"

[recording.fastwhisper]
# faster-whisper 実行ファイルのパス
fast_whisper_path = "faster-whisper"

# 使用モデル（base, small, medium, large-v3, turbo など）
model = "base"

# 推論デバイス（cpu, cuda）
device = "cpu"

# 文字起こし言語（空文字で自動判定）
language = ""

# 使用スレッド数（0で自動）
threads = 0

# 字幕1行あたりの最大文字幅
max_line_width = 100

# 字幕生成失敗時の最大再試行回数
retry_max_failures = 3

# 字幕生成失敗時の再試行待機時間（秒）
retry_delay_seconds = 2

[recording.chat]
# IRCリアルタイムコメント取得を有効にするか
enabled = false

# モデレーションイベント(CLEARCHAT/CLEARMSG/USERNOTICE/NOTICE/ROOMSTATE)を保存するか
capture_moderation_events = true

# IRC切断時の再接続待機時間（秒）
reconnect_delay_seconds = 5

# IRC接続タイムアウト（秒）
connect_timeout_seconds = 15

# IRC読み取りタイムアウト（秒）
read_timeout_seconds = 120

# chat収集のデバッグログ
debug = false

[startup]
# Windows スタートアップ登録を行うか
enabled = false
